{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.postgresql.name }}-{{ .Values.sonarqube.name }}-env
  labels:
    {{- toYaml .Values.labels | nindent 4 }}
data:
  SONAR_JDBC_USERNAME: "{{ .Values.postgresql.env.user }}"
  SONAR_JDBC_URL: jdbc:postgresql://{{ .Values.sonarqube.name }}-db-{{ .Values.postgresql.name }}.{{ .Values.sonarqube.name }}:{{ .Values.postgresql.service.port }}/{{ .Values.postgresql.env.database }}
  BITNAMI_DEBUG: "false"
  POSTGRES_PORT_NUMBER: "{{ .Values.postgresql.service.port }}"
  PGDATA: /var/lib/postgresql/data
  POSTGRES_USER: {{ .Values.postgresql.env.user }}
  POSTGRES_DB: {{ .Values.postgresql.env.database }}
  POSTGRES_SHARED_BUFFERS: "{{ .Values.postgresql.env.sharedBuffers }}"
  POSTGRES_WORK_MEM: "{{ .Values.postgresql.env.workMem }}"
{{- end }}
