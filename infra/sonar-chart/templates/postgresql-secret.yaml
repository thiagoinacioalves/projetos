{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: sonar-db-{{ .Values.postgresql.name }}
  labels:
    app: {{ .Values.postgresql.name }}
    release: sonar-db
type: Opaque
data:
  postgresql-password: {{ .Values.postgresql.password }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.password }}
{{- end }}
