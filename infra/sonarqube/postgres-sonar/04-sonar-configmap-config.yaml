apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: sonarqube
    release: sonarqube
  name: postgres-sonarqube-env
data:
  SONAR_JDBC_USERNAME: "sonar"
  SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db-postgresql.sonarqube:5432/sonar
  BITNAMI_DEBUG: "false"
  POSTGRES_PORT_NUMBER: "5432"
  PGDATA: /var/lib/postgresql/data
  POSTGRES_USER: sonar
  POSTGRES_DB: sonar
  POSTGRES_SHARED_BUFFERS: "256MB"
  POSTGRES_WORK_MEM: "4MB"
