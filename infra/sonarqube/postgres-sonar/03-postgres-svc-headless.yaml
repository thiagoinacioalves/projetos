apiVersion: v1
kind: Service
metadata:
  labels:
    app: postgresql
    release: sonar-db
  name: sonar-db-postgresql-headless
spec:
  clusterIP: None
  ports:
  - name: postgresql
    port: 5432
    protocol: TCP
    targetPort: postgresql
  selector:
    app: postgresql
    release: sonar-db
  sessionAffinity: None
  type: ClusterIP
